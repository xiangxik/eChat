services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: echat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-echat}
      POSTGRES_USER: ${POSTGRES_USER:-echat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: echat-redis
    command: >-
      sh -c 'if [ -n "$${REDIS_PASSWORD}" ]; then exec redis-server --requirepass "$${REDIS_PASSWORD}"; else exec redis-server; fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10

  chatbot-service:
    build:
      context: ./services/chatbot-service
      dockerfile: Dockerfile
    container_name: echat-chatbot-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-echat}
      DB_USERNAME: ${POSTGRES_USER:-echat}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CONTEXT_EMBEDDING_DIMENSION: ${CONTEXT_EMBEDDING_DIMENSION:-1536}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET:-change-this-local-32-byte-secret-0001}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai-compatible}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  chat-web:
    build:
      context: .
      dockerfile: apps/chat-web/Dockerfile
    container_name: echat-chat-web
    depends_on:
      chatbot-service:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_CHATBOT_ID: ${VITE_CHATBOT_ID:-1}
      VITE_CHATBOT_NAME: ${VITE_CHATBOT_NAME:-eChat Assistant}
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    container_name: echat-admin-web
    depends_on:
      chatbot-service:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5174:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
