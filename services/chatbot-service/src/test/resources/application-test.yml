spring:
  datasource:
    url: jdbc:postgresql://${TEST_DB_HOST:${DB_HOST:localhost}}:${TEST_DB_PORT:${DB_PORT:5432}}/${TEST_DB_NAME:${DB_NAME:echat}}?currentSchema=${TEST_DB_SCHEMA:echat_test},public
    username: ${TEST_DB_USERNAME:${DB_USERNAME:echat}}
    password: ${TEST_DB_PASSWORD:${DB_PASSWORD:change-me-local-postgres}}
  flyway:
    enabled: true
    clean-disabled: false
    validate-on-migrate: false
    create-schemas: true
    default-schema: ${TEST_DB_SCHEMA:echat_test}
    schemas: ${TEST_DB_SCHEMA:echat_test}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${TEST_DB_SCHEMA:echat_test}

echat:
  service:
    version: 0.1.0
  llm:
    provider: test-provider
    model: test-model
    base-url: http://localhost:8081/v1
    api-key: test-key
    temperature: 0.2
    max-tokens: 4096
  context:
    default-max-tokens: 12000
    max-conversation-messages: 20
    embedding-dimension: 1536
  security:
    api-key-encryption-secret: test-only-change-this-32-byte-secret
    admin-token: test-admin-token
    allowed-origins: http://localhost:*,http://127.0.0.1:*
    chat-rate-limit-per-minute: 1000
    admin-rate-limit-per-minute: 1000
    admin-cookie-secure: false
    admin-principals:
      - actor-id: test-admin
        display-name: Test Admin
        token: test-admin-token
        tenant-id: tenant-a
        roles: ADMIN,AUDITOR
        attributes:
          department: platform
      - actor-id: test-viewer
        display-name: Test Viewer
        token: test-viewer-token
        tenant-id: tenant-a
        roles: VIEWER
        attributes:
          department: support
      - actor-id: tenant-b-admin
        display-name: Tenant B Admin
        token: test-tenant-b-token
        tenant-id: tenant-b
        roles: ADMIN,AUDITOR